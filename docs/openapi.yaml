  - name: Images
  - name: Infrastructure
  - name: Metrics
  - name: Moments
  - name: Payment
  - name: Referral
  - name: Stories
  - name: Stream
  - name: Support
  - name: User
  - name: Video
  - name: Vip

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or Firebase ID token
      description: Staff JWT from /auth/admin-login, /agency-login, /bd-login OR Firebase ID token for mobile
    webhookSignature:
      type: apiKey
      in: header
      name: X-Signature
      description: Provider HMAC signature on raw body (Stream, Razorpay, Cloudflare)
    metricsToken:
      type: apiKey
      in: header
      name: X-Metrics-Token
      description: Optional ops token when METRICS_TOKEN env is set

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

